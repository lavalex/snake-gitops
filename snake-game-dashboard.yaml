apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: snake-game-dashboard
  namespace: grafana
spec:
  # Links this dashboard to your specific Grafana instance above
  instanceSelector:
    matchLabels:
      graphql-instance: grafana-app
  datasources:
    - inputName: "DS_OPENSHIFT_PROMETHEUS"
      datasourceName: "openshift-prometheus" 
    - inputName: "DS_OPENSHIFT_LOKI"
      datasourceName: "openshift-loki-apps"    
  json: |
    {
      "__inputs": [
        {
          "name": "DS_OPENSHIFT_PROMETHEUS",
          "label": "OpenShift Prometheus",
          "description": "",
          "type": "datasource",
          "pluginId": "prometheus",
          "pluginName": "Prometheus"
        },
        {
          "name": "DS_OPENSHIFT_LOKI",
          "label": "OpenShift Loki (Workloads)",
          "description": "",
          "type": "datasource",
          "pluginId": "loki",
          "pluginName": "Loki"
        }
      ],
      "__elements": {},
      "__requires": [
        {
          "type": "grafana",
          "id": "grafana",
          "name": "Grafana",
          "version": "13.0.1"
        },
        {
          "type": "panel",
          "id": "logs",
          "name": "Logs",
          "version": ""
        },
        {
          "type": "datasource",
          "id": "loki",
          "name": "Loki",
          "version": "13.0.0-pre"
        },
        {
          "type": "panel",
          "id": "piechart",
          "name": "Pie chart",
          "version": ""
        },
        {
          "type": "datasource",
          "id": "prometheus",
          "name": "Prometheus",
          "version": "1.0.0"
        },
        {
          "type": "panel",
          "id": "stat",
          "name": "Stat",
          "version": ""
        }
      ],
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_OPENSHIFT_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "displayName": "👑 ${__field.labels.player_name}",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": 0
                  }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 6,
            "x": 0,
            "y": 0
          },
          "id": 3,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "percentChangeColorMode": "standard",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showPercentChange": false,
            "textMode": "value_and_name",
            "wideLayout": true
          },
          "pluginVersion": "13.0.1",
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_OPENSHIFT_PROMETHEUS}"
              },
              "editorMode": "code",
              "exemplar": false,
              "expr": "snake_high_score",
              "instant": true,
              "legendFormat": "{{player_name}}",
              "range": false,
              "refId": "A"
            }
          ],
          "title": "Highest Score",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_OPENSHIFT_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "fixedColor": "dark-orange",
                "mode": "fixed"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "dark-orange",
                    "value": 0
                  }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 5,
            "x": 6,
            "y": 0
          },
          "id": 1,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "percentChangeColorMode": "standard",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showPercentChange": false,
            "textMode": "auto",
            "wideLayout": true
          },
          "pluginVersion": "13.0.1",
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_OPENSHIFT_PROMETHEUS}"
              },
              "editorMode": "code",
              "expr": "sum(snake_apples_eaten_total)",
              "legendFormat": "__auto",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Apples Eaten",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_OPENSHIFT_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "hideFrom": {
                  "legend": false,
                  "tooltip": false,
                  "viz": false
                }
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 9,
            "x": 11,
            "y": 0
          },
          "id": 2,
          "options": {
            "displayLabels": [
              "value",
              "name"
            ],
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": false
            },
            "pieType": "pie",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "sort": "desc",
            "tooltip": {
              "hideZeros": false,
              "mode": "single",
              "sort": "none"
            }
          },
          "pluginVersion": "13.0.1",
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_OPENSHIFT_PROMETHEUS}"
              },
              "editorMode": "code",
              "exemplar": false,
              "expr": "snake_player_games_total",
              "instant": false,
              "legendFormat": "{{player_name}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Players Games",
          "type": "piechart"
        },
        {
          "datasource": {
            "type": "loki",
            "uid": "${DS_OPENSHIFT_LOKI}"
          },
          "gridPos": {
            "h": 10,
            "w": 20,
            "x": 0,
            "y": 8
          },
          "id": 4,
          "options": {
            "dedupStrategy": "none",
            "detailsMode": "sidebar",
            "enableInfiniteScrolling": false,
            "enableLogDetails": true,
            "prettifyLogMessage": true,
            "showControls": false,
            "showFieldSelector": false,
            "showLevel": true,
            "showTime": true,
            "sortOrder": "Descending",
            "syntaxHighlighting": false,
            "timestampResolution": "ms",
            "unwrappedColumns": false,
            "wrapLogMessage": false
          },
          "pluginVersion": "13.0.1",
          "targets": [
            {
              "datasource": {
                "type": "loki",
                "uid": "${DS_OPENSHIFT_LOKI}"
              },
              "direction": "backward",
              "editorMode": "code",
              "expr": "{ kubernetes_namespace_name=\"snake-game\" } | json | line_format \"{{.message}}\"",
              "queryType": "range",
              "refId": "A"
            }
          ],
          "title": "Game logs",
          "type": "logs"
        }
      ],
      "preload": false,
      "refresh": "5s",
      "schemaVersion": 42,
      "tags": [],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "timepicker": {
        "refresh_intervals": [
          "5s",
          "10s",
          "30s",
          "1m",
          "5m",
          "15m",
          "30m",
          "1h",
          "2h",
          "1d"
        ]
      },
      "timezone": "browser",
      "title": "Snake Game",
      "uid": "ad4ph5q",
      "version": 5,
      "weekStart": ""
    }